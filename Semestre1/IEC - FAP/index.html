<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de titulo</title>

    <style>
        body {
            background-color: aquamarine;
        }
        #texto {
            color: rgb(181, 203, 187)
        }
        .container {
            background-color: burlywood;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p id="texto">Isso é um texto de exemplo que terá sua cor alterada</p>

    <div class="container">
        <ul>
            <li>item 1</li>
            <li>item 2</li>
        </ul>
    </div>
</body>
</html>
